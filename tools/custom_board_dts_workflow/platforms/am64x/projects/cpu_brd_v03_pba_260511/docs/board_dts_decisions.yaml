# AM6412 custom board DTS decision file
# Source schematic: inputs/schematic/CPU_Brd_V03_PBA_260511.pdf
# Generated by manual schematic review, not by automated OCR-only conversion.
# Purpose:
#   This file captures board-level DTS decisions that are not always derivable
#   from OrCAD .NET connectivity alone. The workflow helper should apply these
#   decisions before falling back to the SoC symbol pin name.
#
# Interpretation levels:
#   confirmed_by_schematic:
#     The schematic page explicitly states or clearly shows the intended use.
#   derived_from_schematic:
#     Strongly inferred from schematic context, but still verify in SysConfig DB.
#   needs_hw_confirmation:
#     Schematic shows connection or options, but final product policy/protocol
#     should be confirmed with HW/system owner before production DTS.

version: 1
board: am6412_custom_cpu_board
source_documents:
  - path: inputs/schematic/CPU_Brd_V03_PBA_260511.pdf
    role: custom_board_schematic
    revision: "0.3"
    date: "2026-05-11"
  - path: inputs/netlist/CPU_BRD_V03_PBA_260511.NET
    role: orcad_connectivity_netlist
  - path: ../../db/am64x_sysconfig_pinmux_db.csv
    role: ti_am64x_pinmux_database

rules:
  precedence:
    - board_dts_decisions
    - exact_soc_symbol_pin_match
    - schematic_context_inference
    - unresolved
  workflow_requirements:
    - "Do not use NETNAME as the primary key for pinmux generation."
    - "Use soc_ref + ball + selected_function and validate against SysConfig DB."
    - "If selected_function is not valid for the ball in SysConfig DB, do not generate DTS."
    - "If symbol_pin_name and selected_function differ, this file is the explicit board-level override."
    - "For GPIO decisions, resolve the exact GPIO signal and Linux gpio-controller/line from SysConfig DB and kernel DTS conventions."

mux_decisions:
  - id: test_led2_gpio_on_a7
    status: confirmed_by_schematic
    soc_ref: U1
    schematic_unit: U1H
    ball: A7
    symbol_pin_name: MCU_SPI1_CS0
    net: TEST_LED2
    selected_function: MCU_GPIO0_5
    dts_usage: gpio-led
    linux_target: gpio_leds
    active_level: active_high
    default_state: low
    evidence:
      - page: 19
        title: "SoC SYSTEM & I2C & UART"
        notes:
          - "CPU TEST LED block shows TEST_LED2 connected through LED/FET circuit."
          - "U1H lists MCU_SPI1_CS0 at ball A7."
          - "The intended use is LED GPIO, not SPI chip select."
      - page: 1
        title: "Design Summary"
        notes:
          - "Index identifies page 19 as SoC SYSTEM & I2C & UART."
    sysconfig_validation_required:
      - "Check A7 supports MCU_GPIO0_5 or equivalent GPIO mux function."
      - "Use the validated mux mode and AM64X_MCU_IOPAD offset from SysConfig DB."

  - id: test_led1_gpio_on_prg1_pru0_gpo15
    status: confirmed_by_schematic
    soc_ref: U1
    schematic_unit: U1L
    ball: Y9
    symbol_pin_name: PRG1_PRU0_GPO15
    net: TEST_LED1
    selected_function: GPIO0_60
    dts_usage: gpio-led
    linux_target: gpio_leds
    active_level: active_high
    default_state: low
    evidence:
      - page: 16
        title: "SoC PRG (RGMII)"
        notes:
          - "TEST section shows TEST_LED1 connected from PRG/RGMII page."
          - "U1L lists PRG1_PRU0_GPO15 at ball Y9."
      - page: 19
        title: "SoC SYSTEM & I2C & UART"
        notes:
          - "CPU TEST LED block includes LED1/TEST_LED1 context."
    sysconfig_validation_required:
      - "Check Y9 supports GPIO0_60 or intended GPIO function in SysConfig DB."

  - id: soc_uart2_txd_on_mmc1_dat2
    status: confirmed_by_schematic
    soc_ref: U1
    schematic_unit: U1I
    ball: K19
    symbol_pin_name: MMC1_DAT2
    net: SoC_UART2_TXD
    selected_function: UART2_TXD
    dts_usage: pinctrl
    linux_target: main_uart2
    evidence:
      - page: 13
        title: "SoC MMC"
        notes:
          - "MMC1 SD Card 4bit is marked Not Used."
          - "SoC UART2 TXD/RXD is shown in the MMC1 area."
          - "U1I lists MMC1_DAT2 at ball K19."
      - page: 30
        title: "DEBUG (UART to USB)"
        notes:
          - "SoC_UART2_TXD appears in the debug UART routing context."
    sysconfig_validation_required:
      - "Check K19 supports UART2_TXD mux function."
      - "Use generated mux mode and pad offset for DTS pinctrl."

  - id: soc_uart2_rxd_on_mmc1_dat3
    status: confirmed_by_schematic
    soc_ref: U1
    schematic_unit: U1I
    ball: K18
    symbol_pin_name: MMC1_DAT3
    net: SoC_UART2_RXD
    selected_function: UART2_RXD
    dts_usage: pinctrl
    linux_target: main_uart2
    evidence:
      - page: 13
        title: "SoC MMC"
        notes:
          - "MMC1 SD Card 4bit is marked Not Used."
          - "SoC UART2 TXD/RXD is shown in the MMC1 area."
          - "U1I lists MMC1_DAT3 at ball K18."
      - page: 16
        title: "SoC PRG (RGMII)"
        notes:
          - "SoC UART2 RXD/TXD is also referenced from PRG/RGMII page."
      - page: 30
        title: "DEBUG (UART to USB)"
        notes:
          - "SoC_UART2_RXD appears in the debug UART routing context."
    sysconfig_validation_required:
      - "Check K18 supports UART2_RXD mux function."
      - "Use generated mux mode and pad offset for DTS pinctrl."

  - id: ospi_reset_gpio_on_ospi0_csn2
    status: derived_from_schematic
    soc_ref: U1
    schematic_unit: U1J
    ball: K17
    symbol_pin_name: OSPI0_CSN2
    net: GPIO_OSPI_RSTn
    selected_function: GPIO0_13
    dts_usage: reset-gpio
    linux_target: ospi_flash_reset
    active_level: active_low
    evidence:
      - page: 14
        title: "SoC OSPI"
        notes:
          - "OSPI FLASH RESET block shows GPIO_OSPI_RSTn."
          - "SoC OSPI page labels GPIO0_13 near OSPI reset context."
          - "U1J lists OSPI0_CSN2 at ball K17."
    sysconfig_validation_required:
      - "Check K17 supports GPIO0_13 or intended GPIO mux function."

  - id: ospi_interrupt_gpio_on_ospi0_csn3
    status: derived_from_schematic
    soc_ref: U1
    schematic_unit: U1J
    ball: L17
    symbol_pin_name: OSPI0_CSN3
    net: OSPI_INTn
    selected_function: GPIO0_14
    dts_usage: interrupt-gpio
    linux_target: ospi_flash_interrupt_optional
    active_level: active_low
    evidence:
      - page: 14
        title: "SoC OSPI"
        notes:
          - "SoC OSPI page labels OSPI_INTn and GPIO0_14."
          - "U1J lists OSPI0_CSN3 at ball L17."
    sysconfig_validation_required:
      - "Check L17 supports GPIO0_14 or intended GPIO mux function."

controller_decisions:
  - id: mmc0_emmc_8bit
    status: confirmed_by_schematic
    controller: sdhci0
    peripheral: MMC0
    dts_node: "&sdhci0"
    enabled: true
    bus_width: 8
    non_removable: true
    device: eMMC
    device_ref: U22
    device_part: MKEMF032GT2E-IE
    evidence:
      - page: 13
        title: "SoC MMC"
        notes:
          - "Page labels MMC0 as eMMC 8bit."
          - "U1I lists MMC0 CLK/CMD/DAT0..DAT7/DS pins."
      - page: 26
        title: "eMMC"
        notes:
          - "U22 is MKEMF032GT2E-IE eMMC device."
          - "MMC0 DAT0..DAT7, DS, CMD, CLK nets route to eMMC."
    dts_hints:
      - "status = okay"
      - "bus-width = <8>"
      - "non-removable"
    unresolved:
      - "Confirm reset-gpios representation if GPIO_eMMC_RSTn is controlled by Linux."
      - "Confirm vmmc/vqmmc supply labels if regulator nodes are generated."

  - id: mmc1_sd_not_used
    status: confirmed_by_schematic
    controller: sdhci1
    peripheral: MMC1
    dts_node: "&sdhci1"
    enabled: false
    evidence:
      - page: 13
        title: "SoC MMC"
        notes:
          - "MMC1 SD Card 4bit is explicitly marked Not Used."
          - "MMC1_DAT2/DAT3 are reused for SoC UART2."
    dts_hints:
      - "Do not generate SD-card sdhci1 enable node unless board policy changes."

  - id: ospi0_flash
    status: confirmed_by_schematic
    controller: ospi0
    dts_node: "&ospi0"
    enabled: true
    flash_ref: U2
    flash_part: MX66UM1G45GXDR00-T
    bus_width: 8
    evidence:
      - page: 14
        title: "SoC OSPI"
        notes:
          - "Page labels SoC OSPI and OSPI FLASH."
          - "U1J lists OSPI0_CLK, D0..D7, DQS, CSN0 and related CS pins."
          - "U2 is MX66UM1G45GXDR00-T OSPI flash."
    unresolved:
      - "Confirm Linux compatible string for Macronix OSPI flash."
      - "Confirm reset-gpios and interrupt-gpios usage."

  - id: cpsw_rgmii_dual_phy
    status: confirmed_by_schematic
    controller: cpsw3g
    dts_node: "&cpsw3g"
    enabled: true
    ports:
      - port: 1
        interface: RGMII1
        phy_ref: U24
        phy_part: DP83867IRRGZ
      - port: 2
        interface: RGMII2
        phy_ref: U26
        phy_part: DP83867IRRGZ
    evidence:
      - page: 16
        title: "SoC PRG (RGMII)"
        notes:
          - "RGMII1 and RGMII2 signal groups are shown."
          - "CPSW_RGMII_MDC and CPSW_RGMII_MDIO are common."
      - page: 27
        title: "ETHERNET PHY1"
        notes:
          - "U24 is DP83867IRRGZ Ethernet PHY1."
      - page: 28
        title: "ETHERNET PHY2"
        notes:
          - "U26 is DP83867IRRGZ Ethernet PHY2."
      - page: 29
        title: "ETHERNET PHY STRAP"
        notes:
          - "PHY1 and PHY2 strap summaries are shown."
    unresolved:
      - "Map exact CPSW port labels and phy-handle names according to TI kernel DTSI."
      - "Confirm phy-mode string based on delay configuration."

  - id: usb0_usb2_with_vbus_id
    status: needs_hw_confirmation
    controller: usb0
    dts_nodes:
      - "&usbss0"
      - "&usb0"
    enabled: true
    observed_signals:
      - USB0_DP
      - USB0_DM
      - USB0_VBUS
      - USB0_ID
      - USB0_DRVVBUS
    evidence:
      - page: 18
        title: "SoC USB & SERDES"
        notes:
          - "USB0 DP/DM, VBUS, ID, DRVVBUS are shown."
          - "Page notes USB0_ID GND means Host; Float means Slave."
          - "Page labels USB2.0."
    policy_required:
      - "Confirm final dr_mode: host, peripheral, or otg."
      - "Confirm whether USB0_ID is runtime role input or fixed strap."
      - "Confirm vbus-supply/drivebus representation in TI kernel DTS."

  - id: serdes0_protocol
    status: needs_hw_confirmation
    controller: serdes0
    observed_signals:
      - SERDES_RX_P
      - SERDES_RX_N
      - SERDES_TX_P
      - SERDES_TX_N
      - SERDES_REFCLK_P
      - SERDES_REFCLK_N
    evidence:
      - page: 18
        title: "SoC USB & SERDES"
        notes:
          - "SERDES0 section lists PCIe Gen2 mode and USB Super Speed mode."
          - "SERDES TX/RX and REFCLK nets are routed."
      - page: 23
        title: "PCIe Channel Exchange Switch"
        notes:
          - "SERDES TX/RX nets route through PCIe channel switch context."
      - page: 35
        title: "FPGA BANK 216 (GTP)"
        notes:
          - "FPGA SERDES RX/TX and reference clock nets are present."
    policy_required:
      - "Confirm final SERDES0 protocol: PCIe or USB3."
      - "Confirm DTS lane/protocol configuration style for the target kernel."

external_device_decisions:
