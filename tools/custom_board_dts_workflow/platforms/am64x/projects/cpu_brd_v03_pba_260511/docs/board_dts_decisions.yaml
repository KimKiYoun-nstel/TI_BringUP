    status: confirmed_by_schematic
    bus: main_i2c0
    dts_parent: "&main_i2c0"
    refdes: U14
    part: AT24C512C-MAHM-E
    compatible: atmel,24c512
    reg: 0x51
    purpose: board_id_eeprom
    evidence:
      - page: 23
        title: "PCIe Channel Exchange Switch / I2C0 EEPROM"
        notes:
          - "Page labels I2C0 EEPROM (Board ID)."
          - "7-bit I2C address is explicitly shown as 0x51."
          - "U14 is AT24C512C-MAHM-E."
      - page: 19
        title: "SoC SYSTEM & I2C & UART"
        notes:
          - "I2C0_SCL and I2C0_SDA connect to SoC pins A18/B18."

  - id: i2c1_tpm_for_test
