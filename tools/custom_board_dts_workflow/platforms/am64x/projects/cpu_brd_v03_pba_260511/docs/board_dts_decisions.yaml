        title: "I2C1 Temperature Monitor"
        notes:
          - "Page labels I2C1 Temperature Monitor."
          - "U20 is ADS1115QNKSRQ1."
          - "7-bit I2C address is explicitly shown as 0x48."
          - "TMP235 sensors feed ADC AIN0..AIN3."
    unresolved:
      - "Confirm IIO channel configuration if exposing all temperature inputs via Linux."

ethernet_phy_decisions:
  - id: cpsw_phy1_dp83867
    status: confirmed_by_schematic
    phy_ref: U24
    part: DP83867IRRGZ
    mdio_bus: cpsw_mdio
    mdio_address: 0
    reset_net: GPIO_CPSW1_RST
    interrupt_net: CPSW_RGMII1_INTn
    tx_clock_skew: "0ns"
    rx_clock_skew: "2.0ns"
    auto_negotiation: enabled
    advertised: "10/100/1000"
    evidence:
      - page: 27
        title: "ETHERNET PHY1"
        notes:
          - "U24 is DP83867IRRGZ."
          - "CPSW_RGMII1 signals connect to PHY1."
      - page: 29
        title: "ETHERNET PHY STRAP"
        notes:
          - "PHY1 summary shows PHY ADDRESS[3:0] 0000."
          - "TX clock skew is 0ns; RX clock skew is 2.0ns."
          - "Auto-negotiation is enabled."
    dts_mapping_required:
      - "Map strap result to phy-mode and DP83867-specific delay properties."

  - id: cpsw_phy2_dp83867
    status: confirmed_by_schematic
    phy_ref: U26
    part: DP83867IRRGZ
    mdio_bus: cpsw_mdio
    mdio_address: 1
    reset_net: GPIO_CPSW2_RST
    interrupt_net: CPSW_RGMII2_INTn
    tx_clock_skew: "0ns"
    rx_clock_skew: "2.0ns"
    auto_negotiation: enabled
    advertised: "10/100/1000"
    evidence:
      - page: 28
        title: "ETHERNET PHY2"
        notes:
          - "U26 is DP83867IRRGZ."
          - "CPSW_RGMII2 signals connect to PHY2."
      - page: 29
        title: "ETHERNET PHY STRAP"
        notes:
          - "PHY2 summary shows PHY ADDRESS[3:0] 0001."
          - "TX clock skew is 0ns; RX clock skew is 2.0ns."
          - "Auto-negotiation is enabled."
    dts_mapping_required:
      - "Map strap result to phy-mode and DP83867-specific delay properties."

report_only:
  - id: lpddr4
    status: confirmed_by_schematic
    reason: "LPDDR4 is not Linux DTS pinctrl. It belongs to DDR/SPL configuration."
    evidence:
      - page: 12
        title: "SoC LPDDR4"
        notes:
          - "U1G lists DDR0 pins."
      - page: 22
        title: "LPDDR4"
        notes:
          - "U12 is MT53E1G16D1ZW-046 AIT-C LPDDR4 device."

  - id: bootmode_gpmc_ad_pins
    status: confirmed_by_schematic
    reason: "GPMC0_AD[15:0] are involved in boot mode strap and FPGA bus; DTS policy must be separate from boot strap hardware facts."
    evidence:
      - page: 17
        title: "SoC GPMC BUS"
        notes:
          - "Page shows 16bit BOOT MODE table and GPMC0_AD[15:0]."
          - "Page also indicates FPGA async non-multiplexed 16bit NOR access interface."
