# Canonical local-fullchain profile for SK-AM64B SBL OSPI Linux.
#
# This profile is the repo-managed execution baseline after separating
# bootable/fullchain lineage from legacy mixed/prebuilt experiments.
#
# Source of truth:
# - offset model follows TI `default_sbl_ospi_linux*.cfg`
# - SBL keeps the LPDDR4-aligned clean workspace base
# - final flash inputs are staged under repo-managed `out/sk-am64b-sbl-ospi-linux-local-fullchain/`
# - linux appimage is generated from local unsigned TF-A/OP-TEE + local U-Boot A53 chain

--flash-writer=sbl_prebuilt/am64x-sk/sbl_uart_uniflash.release.hs_fs.tiimage

# Keep disabled unless a specific PHY tuning regression is under investigation.
# --operation=flash-phy-tuning-data

--file=/home/nstel/ti/TI_Bringup/out/sk-am64b-sbl-ospi-linux-local-fullchain/sbl_ospi_linux.release.hs_fs.tiimage --operation=flash --flash-offset=0x0
--file=/home/nstel/ti/TI_Bringup/out/sk-am64b-sbl-ospi-linux-local-fullchain/r5f-early-heartbeat.mcelf.hs_fs --operation=flash --flash-offset=0x80000
--file=/home/nstel/ti/TI_Bringup/out/sk-am64b-sbl-ospi-linux-local-fullchain/u-boot.img --operation=flash --flash-offset=0x300000
--file=/home/nstel/ti/TI_Bringup/out/sk-am64b-sbl-ospi-linux-local-fullchain/linux.mcelf.hs_fs --operation=flash --flash-offset=0x800000
