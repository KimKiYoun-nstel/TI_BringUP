--file=/home/nstel/ti/TI_Bringup/out/sk-am64b-r5f-early-boot/images/r5f-early-heartbeat.mcelf.hs_fs --operation=flash --flash-offset=0x80000
--file=/home/nstel/ti/TI_Bringup/out/r5f-early-boot/linux-appimage-build-sdk-spl/u-boot.img --operation=flash --flash-offset=0x300000
