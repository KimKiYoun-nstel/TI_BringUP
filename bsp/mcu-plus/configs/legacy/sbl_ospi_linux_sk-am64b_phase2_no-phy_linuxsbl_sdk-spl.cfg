# Guide-aligned Phase2 flash config for SK-AM64B early-boot validation.
#
# Retry variant:
# - keeps the SK flashwriter (`am64x-sk`)
# - keeps the Linux-capable SBL image at offset 0x0 (`sbl_ospi_linux`)
# - keeps the custom R5F image at offset 0x80000
# - swaps only the Linux appimage to the variant generated with
#   SDK `u-boot-spl.bin-am64xx-evm` as the SPL input
# - keeps flash-phy-tuning-data disabled because that command was the first
#   failure point in an earlier retry.

--flash-writer=sbl_prebuilt/am64x-sk/sbl_uart_uniflash.release.hs_fs.tiimage

# Intentionally skipped on this retry:
# --operation=flash-phy-tuning-data

